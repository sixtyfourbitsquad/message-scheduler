upstream channel_bot_upstream {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name YOURSUBDOMAIN.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name YOURSUBDOMAIN.duckdns.org;

    # certbot will populate ssl_certificate paths; placeholders shown for clarity.
    # ssl_certificate /etc/letsencrypt/live/YOURSUBDOMAIN.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOURSUBDOMAIN.duckdns.org/privkey.pem;

    client_max_body_size 20m;

    location /health {
        proxy_pass http://channel_bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhook {
        proxy_pass http://channel_bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
